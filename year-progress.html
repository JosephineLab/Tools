<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Year Progress — Freelancer OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ═══ THEME ═══ */
:root {
  --bg: #0b0b12;
  --paper: #15151f;
  --paper-2: #1c1c28;
  --text: #ededf3;
  --text-dim: #8a8a9c;
  --text-faint: #5a5a6c;
  --border: rgba(255, 255, 255, 0.07);
  --accent: #a78bfa;
  --accent-soft: rgba(167, 139, 250, 0.13);
  --bar-bg: rgba(255, 255, 255, 0.07);
}
[data-theme="light"] {
  --bg: #f7f5f0;
  --paper: #ffffff;
  --paper-2: #fcfaf5;
  --text: #1a1814;
  --text-dim: #6b6760;
  --text-faint: #a8a39a;
  --border: rgba(26, 24, 20, 0.10);
  --accent: #6E56CF;
  --accent-soft: rgba(110, 86, 207, 0.10);
  --bar-bg: rgba(26, 24, 20, 0.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); }
body {
  font-family: 'Hanken Grotesk', -apple-system, sans-serif;
  color: var(--text);
  min-height: 100vh;
  padding: 32px 24px;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
  transition: background 0.3s ease, color 0.3s ease;
  display: flex; align-items: center; justify-content: center;
}
.container { width: 100%; max-width: 540px; }
.card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 30px 34px;
  position: relative;
  transition: background 0.3s ease, border-color 0.3s ease;
}

/* ═══ THEME TOGGLE ═══ */
.theme-toggle {
  position: absolute; top: 16px; right: 16px;
  background: var(--paper-2); border: 1px solid var(--border);
  color: var(--text-dim); width: 32px; height: 32px;
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s ease;
}
.theme-toggle:hover {
  border-color: var(--accent); color: var(--accent);
  background: var(--accent-soft);
}
.theme-toggle svg { width: 13px; height: 13px; }
[data-theme="dark"] .icon-moon { display: none; }
[data-theme="light"] .icon-sun { display: none; }

/* ═══ HEADER ═══ */
.label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 500;
  color: var(--text-faint);
  letter-spacing: 0.32em;
  margin-bottom: 8px;
}
.year-line {
  font-family: 'Fraunces', Georgia, serif;
  font-weight: 300; letter-spacing: -0.02em;
  font-size: 38px;
  color: var(--text);
  margin-bottom: 24px;
  line-height: 1;
}
.year-line em {
  font-style: italic;
  color: var(--accent);
}

/* ═══ PROGRESS ROWS ═══ */
.row { margin-bottom: 22px; }
.row:last-child { margin-bottom: 0; }
.row-head {
  display: flex; justify-content: space-between; align-items: baseline;
  margin-bottom: 7px;
}
.row-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.row-value {
  font-family: 'Fraunces', serif; font-weight: 400;
  font-size: 18px; font-style: italic;
  color: var(--text-dim);
}
.row-value .pct {
  color: var(--accent);
  font-weight: 500;
}
.bar {
  height: 4px; background: var(--bar-bg);
  border-radius: 2px; overflow: hidden;
}
.bar-fill {
  height: 100%; background: var(--accent);
  border-radius: 2px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ═══ FOOTER ═══ */
.meta {
  margin-top: 24px;
  padding-top: 16px;
  border-top: 1px solid var(--border);
  font-family: 'Fraunces', serif; font-style: italic;
  font-size: 13px; color: var(--text-faint);
  text-align: center;
}

@media (max-width: 480px) {
  body { padding: 20px 14px; }
  .card { padding: 24px 22px; }
  .year-line { font-size: 30px; margin-bottom: 18px; }
  .row { margin-bottom: 18px; }
  .row-value { font-size: 16px; }
}
</style>
</head>
<body data-theme="dark">
  <div class="container">
    <div class="card">
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      <div class="label" id="label">— — — —</div>
      <div class="year-line">A <em id="year-em">year</em> in progress.</div>

      <div class="row">
        <div class="row-head">
          <span class="row-label" id="year-row-label">YEAR</span>
          <span class="row-value"><span id="year-day">—</span> of <span id="year-total">—</span> · <span class="pct" id="year-pct">—%</span></span>
        </div>
        <div class="bar"><div class="bar-fill" id="year-bar" style="width: 0%"></div></div>
      </div>

      <div class="row">
        <div class="row-head">
          <span class="row-label" id="quarter-row-label">QUARTER —</span>
          <span class="row-value"><span class="pct" id="quarter-pct">—%</span></span>
        </div>
        <div class="bar"><div class="bar-fill" id="quarter-bar" style="width: 0%"></div></div>
      </div>

      <div class="row">
        <div class="row-head">
          <span class="row-label" id="week-row-label">WEEK —</span>
          <span class="row-value"><span class="pct" id="week-pct">—%</span></span>
        </div>
        <div class="bar"><div class="bar-fill" id="week-bar" style="width: 0%"></div></div>
      </div>

      <div class="meta" id="meta">Make today count.</div>
    </div>
  </div>

<script>
function isLeapYear(y) { return (y % 4 === 0 && y % 100 !== 0) || (y % 400 === 0); }
function daysInYear(y) { return isLeapYear(y) ? 366 : 365; }

function render() {
  const now = new Date();
  const year = now.getFullYear();
  const total = daysInYear(year);

  // Day of year
  const start = new Date(year, 0, 1);
  const dayOfYear = Math.floor((now - start) / 86400000) + 1;
  const yearPct = Math.round((dayOfYear / total) * 100);

  // Quarter
  const month = now.getMonth();
  const q = Math.floor(month / 3) + 1;
  const qStart = new Date(year, (q - 1) * 3, 1);
  const qEnd = new Date(year, q * 3, 1);
  const qProgress = (now - qStart) / (qEnd - qStart);
  const qPct = Math.round(qProgress * 100);

  // ISO week
  const d = new Date(Date.UTC(year, month, now.getDate()));
  const dn = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - dn);
  const ys = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const weekNum = Math.ceil((((d - ys) / 86400000) + 1) / 7);

  // Day within week (Mon-Sun, 1-7)
  const dayOfWeek = ((now.getDay() + 6) % 7) + 1;
  const weekPct = Math.round((dayOfWeek / 7) * 100);

  // Editorial meta line
  const remaining = total - dayOfYear;
  let meta = '';
  if (yearPct < 25) meta = 'The year is yours to shape.';
  else if (yearPct < 50) meta = 'Halfway is just ahead.';
  else if (yearPct < 75) meta = 'Second half. Make it count.';
  else if (yearPct < 95) meta = `${remaining} days left to finish strong.`;
  else meta = 'Closing the year. Reflect.';

  // Render
  document.getElementById('label').textContent = String(year).split('').join(' ');
  document.getElementById('year-em').textContent = year;
  document.getElementById('year-day').textContent = `Day ${dayOfYear}`;
  document.getElementById('year-total').textContent = total;
  document.getElementById('year-pct').textContent = yearPct + '%';
  document.getElementById('year-bar').style.width = yearPct + '%';

  document.getElementById('quarter-row-label').textContent = `QUARTER Q${q}`;
  document.getElementById('quarter-pct').textContent = qPct + '%';
  document.getElementById('quarter-bar').style.width = qPct + '%';

  document.getElementById('week-row-label').textContent = `WEEK ${weekNum}`;
  document.getElementById('week-pct').textContent = weekPct + '%';
  document.getElementById('week-bar').style.width = weekPct + '%';

  document.getElementById('meta').textContent = meta;
}

document.getElementById('theme-toggle').addEventListener('click', () => {
  const cur = document.body.dataset.theme;
  document.body.dataset.theme = cur === 'dark' ? 'light' : 'dark';
});

render();
</script>
</body>
</html>
