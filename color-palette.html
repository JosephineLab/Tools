<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Palette Picker — Freelancer OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;1,9..144,400&family=Hanken+Grotesk:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0b0b12;
  --paper: #15151f;
  --paper-2: #1c1c28;
  --text: #ededf3;
  --text-dim: #8a8a9c;
  --text-faint: #5a5a6c;
  --border: rgba(255, 255, 255, 0.07);
  --border-strong: rgba(255, 255, 255, 0.16);
  --accent: #a78bfa;
  --accent-soft: rgba(167, 139, 250, 0.13);
}
[data-theme="light"] {
  --bg: #f7f5f0;
  --paper: #ffffff;
  --paper-2: #fcfaf5;
  --text: #1a1814;
  --text-dim: #6b6760;
  --text-faint: #a8a39a;
  --border: rgba(26, 24, 20, 0.10);
  --border-strong: rgba(26, 24, 20, 0.22);
  --accent: #6E56CF;
  --accent-soft: rgba(110, 86, 207, 0.10);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); }
body {
  font-family: 'Hanken Grotesk', -apple-system, sans-serif;
  color: var(--text);
  min-height: 100vh;
  padding: 36px 24px;
  -webkit-font-smoothing: antialiased;
  line-height: 1.5;
  transition: background 0.3s ease, color 0.3s ease;
}
.container { max-width: 680px; margin: 0 auto; }
.card {
  background: var(--paper);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 34px 36px;
  position: relative;
  transition: background 0.3s ease, border-color 0.3s ease;
}

/* ═══ THEME TOGGLE ═══ */
.theme-toggle {
  position: absolute; top: 18px; right: 18px;
  background: var(--paper-2); border: 1px solid var(--border);
  color: var(--text-dim); width: 34px; height: 34px;
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.25s ease;
}
.theme-toggle:hover {
  border-color: var(--accent); color: var(--accent);
  background: var(--accent-soft);
}
.theme-toggle svg { width: 14px; height: 14px; }
[data-theme="dark"] .icon-moon { display: none; }
[data-theme="light"] .icon-sun { display: none; }

/* ═══ HEADER ═══ */
.tag {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 500;
  color: var(--text-faint);
  letter-spacing: 0.32em;
  margin-bottom: 10px;
}
.title {
  font-family: 'Fraunces', serif;
  font-weight: 300; letter-spacing: -0.02em;
  font-size: 36px; line-height: 1.05;
  color: var(--text);
  margin-bottom: 28px;
}
.title em { font-style: italic; color: var(--accent); font-weight: 400; }

/* ═══ CONTROLS ═══ */
.controls {
  display: flex; flex-direction: column; gap: 18px;
  margin-bottom: 28px;
}
.control-group { display: flex; flex-direction: column; gap: 8px; }
.control-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--text-faint);
}
.seed-row { display: flex; align-items: center; gap: 12px; }
.color-input-wrap {
  position: relative;
  width: 56px; height: 56px;
  border-radius: 10px; overflow: hidden;
  border: 1px solid var(--border-strong);
  flex-shrink: 0;
}
.color-input-wrap input[type="color"] {
  position: absolute; inset: -4px;
  width: calc(100% + 8px); height: calc(100% + 8px);
  border: none; padding: 0; cursor: pointer;
  background: transparent;
}
.hex-input {
  flex: 1; font-family: 'JetBrains Mono', monospace;
  font-size: 14px; font-weight: 500;
  background: var(--paper-2); border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 14px; border-radius: 10px;
  letter-spacing: 0.05em;
  transition: border-color 0.25s ease;
}
.hex-input:focus { outline: none; border-color: var(--accent); }

/* ═══ SCHEMES ═══ */
.schemes {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.scheme-btn {
  font-family: 'Hanken Grotesk', sans-serif;
  font-size: 12px; font-weight: 500;
  background: var(--paper-2); border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 10px 12px; border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.scheme-btn:hover {
  border-color: var(--accent-soft); color: var(--text);
}
.scheme-btn.active {
  background: var(--accent-soft); border-color: var(--accent);
  color: var(--accent); font-weight: 600;
}

/* ═══ PALETTE ═══ */
.palette {
  display: grid; grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}
.swatch {
  display: flex; flex-direction: column;
  border-radius: 10px; overflow: hidden;
  border: 1px solid var(--border);
  cursor: pointer;
  transition: transform 0.2s ease, border-color 0.2s ease;
  position: relative;
}
.swatch:hover { transform: translateY(-2px); border-color: var(--border-strong); }
.swatch-color {
  width: 100%; aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  transition: filter 0.2s ease;
}
.swatch-color .copy-feedback {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 500;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: white; opacity: 0;
  background: rgba(0, 0, 0, 0.5);
  padding: 4px 10px; border-radius: 4px;
  transition: opacity 0.25s ease;
  text-shadow: 0 1px 2px rgba(0,0,0,0.3);
}
.swatch.copied .copy-feedback { opacity: 1; }
.swatch-info {
  background: var(--paper-2);
  padding: 8px 6px;
  text-align: center;
}
.swatch-hex {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; font-weight: 500;
  color: var(--text); letter-spacing: 0.05em;
}

/* ═══ FOOTER ═══ */
.help {
  margin-top: 22px;
  padding-top: 18px;
  border-top: 1px solid var(--border);
  font-family: 'Fraunces', serif; font-style: italic;
  font-size: 13px; color: var(--text-faint);
  text-align: center;
}

@media (max-width: 580px) {
  body { padding: 22px 14px; }
  .card { padding: 26px 22px; }
  .title { font-size: 28px; }
  .schemes { grid-template-columns: repeat(2, 1fr); }
  .swatch-hex { font-size: 9px; }
}
</style>
</head>
<body data-theme="dark">
  <div class="container">
    <div class="card">
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>

      <div class="tag">P A L E T T E &nbsp; G E N E R A T O R</div>
      <div class="title">Pick a color, find its <em>family</em>.</div>

      <div class="controls">
        <div class="control-group">
          <span class="control-label">Seed Color</span>
          <div class="seed-row">
            <div class="color-input-wrap" style="background: #6E56CF">
              <input type="color" id="seed-color" value="#6E56CF">
            </div>
            <input type="text" class="hex-input" id="hex-input" value="#6E56CF" maxlength="7">
          </div>
        </div>

        <div class="control-group">
          <span class="control-label">Scheme</span>
          <div class="schemes" id="schemes">
            <button class="scheme-btn" data-scheme="mono">Monochromatic</button>
            <button class="scheme-btn active" data-scheme="analogous">Analogous</button>
            <button class="scheme-btn" data-scheme="complementary">Complementary</button>
            <button class="scheme-btn" data-scheme="split">Split-Complem.</button>
            <button class="scheme-btn" data-scheme="triadic">Triadic</button>
            <button class="scheme-btn" data-scheme="tetradic">Tetradic</button>
          </div>
        </div>
      </div>

      <div class="palette" id="palette"></div>

      <div class="help">Click any swatch to copy its hex value.</div>
    </div>
  </div>

<script>
// ═══ COLOR CONVERSION ═══
function hexToHsl(hex) {
  hex = hex.replace('#', '');
  const r = parseInt(hex.substr(0, 2), 16) / 255;
  const g = parseInt(hex.substr(2, 2), 16) / 255;
  const b = parseInt(hex.substr(4, 2), 16) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)); break;
      case g: h = ((b - r) / d + 2); break;
      case b: h = ((r - g) / d + 4); break;
    }
    h /= 6;
  }
  return [h * 360, s, l];
}

function hslToHex(h, s, l) {
  h = ((h % 360) + 360) % 360;
  s = Math.max(0, Math.min(1, s));
  l = Math.max(0, Math.min(1, l));
  const c = (1 - Math.abs(2 * l - 1)) * s;
  const x = c * (1 - Math.abs(((h / 60) % 2) - 1));
  const m = l - c / 2;
  let r, g, b;
  if (h < 60) [r, g, b] = [c, x, 0];
  else if (h < 120) [r, g, b] = [x, c, 0];
  else if (h < 180) [r, g, b] = [0, c, x];
  else if (h < 240) [r, g, b] = [0, x, c];
  else if (h < 300) [r, g, b] = [x, 0, c];
  else [r, g, b] = [c, 0, x];
  const toHex = (v) => Math.round((v + m) * 255).toString(16).padStart(2, '0');
  return '#' + toHex(r) + toHex(g) + toHex(b);
}

// ═══ PALETTE LOGIC ═══
function generatePalette(seedHex, scheme) {
  const [h, s, l] = hexToHsl(seedHex);
  const sat = Math.max(0.35, Math.min(0.85, s));  // normalize saturation
  const colors = [];

  switch (scheme) {
    case 'mono':
      // Same Hue, vary L
      colors.push(hslToHex(h, sat, 0.2));
      colors.push(hslToHex(h, sat, 0.35));
      colors.push(hslToHex(h, sat, l));   // seed
      colors.push(hslToHex(h, sat * 0.85, 0.7));
      colors.push(hslToHex(h, sat * 0.7, 0.88));
      break;
    case 'analogous':
      // ±30° around hue
      colors.push(hslToHex(h - 30, sat * 0.85, Math.max(0.35, l - 0.05)));
      colors.push(hslToHex(h - 15, sat * 0.92, Math.max(0.4, l)));
      colors.push(hslToHex(h, sat, l));    // seed
      colors.push(hslToHex(h + 15, sat * 0.92, Math.min(0.65, l + 0.05)));
      colors.push(hslToHex(h + 30, sat * 0.85, Math.min(0.7, l + 0.1)));
      break;
    case 'complementary':
      // seed + opposite + variations
      colors.push(hslToHex(h, sat, Math.max(0.25, l - 0.15)));
      colors.push(hslToHex(h, sat, l));    // seed
      colors.push(hslToHex(h, sat * 0.5, 0.92));  // soft neutral
      colors.push(hslToHex(h + 180, sat, l));     // complement
      colors.push(hslToHex(h + 180, sat, Math.max(0.25, l - 0.15)));
      break;
    case 'split':
      // seed + 2 colors adjacent to complement (+150, +210)
      colors.push(hslToHex(h, sat, Math.max(0.25, l - 0.1)));
      colors.push(hslToHex(h, sat, l));    // seed
      colors.push(hslToHex(h, sat * 0.4, 0.94));  // light neutral
      colors.push(hslToHex(h + 150, sat * 0.9, l));
      colors.push(hslToHex(h + 210, sat * 0.9, l));
      break;
    case 'triadic':
      // 120° apart
      colors.push(hslToHex(h, sat, Math.max(0.3, l - 0.1)));
      colors.push(hslToHex(h, sat, l));    // seed
      colors.push(hslToHex(h + 120, sat * 0.88, l));
      colors.push(hslToHex(h + 240, sat * 0.88, l));
      colors.push(hslToHex(h + 120, sat * 0.6, 0.85));
      break;
    case 'tetradic':
      // 90° apart
      colors.push(hslToHex(h, sat, l));    // seed
      colors.push(hslToHex(h + 90, sat * 0.85, l));
      colors.push(hslToHex(h + 180, sat * 0.85, l));
      colors.push(hslToHex(h + 270, sat * 0.85, l));
      colors.push(hslToHex(h, sat * 0.4, 0.92));  // neutral
      break;
  }
  return colors;
}

// ═══ RENDER ═══
function getReadableTextColor(hex) {
  const r = parseInt(hex.substr(1, 2), 16);
  const g = parseInt(hex.substr(3, 2), 16);
  const b = parseInt(hex.substr(5, 2), 16);
  const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
  return lum > 0.6 ? 'rgba(0,0,0,0.7)' : 'rgba(255,255,255,0.9)';
}

function renderPalette() {
  const seed = document.getElementById('seed-color').value;
  const scheme = document.querySelector('.scheme-btn.active').dataset.scheme;
  const colors = generatePalette(seed, scheme);
  const container = document.getElementById('palette');
  container.innerHTML = colors.map(c => `
    <div class="swatch" data-hex="${c.toUpperCase()}">
      <div class="swatch-color" style="background: ${c}">
        <span class="copy-feedback" style="color: ${getReadableTextColor(c)}">Copied</span>
      </div>
      <div class="swatch-info">
        <span class="swatch-hex">${c.toUpperCase()}</span>
      </div>
    </div>
  `).join('');

  // Click to copy
  container.querySelectorAll('.swatch').forEach(sw => {
    sw.addEventListener('click', async () => {
      const hex = sw.dataset.hex;
      try {
        await navigator.clipboard.writeText(hex);
        sw.classList.add('copied');
        setTimeout(() => sw.classList.remove('copied'), 1200);
      } catch (e) {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = hex;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        sw.classList.add('copied');
        setTimeout(() => sw.classList.remove('copied'), 1200);
      }
    });
  });
}

// ═══ EVENTS ═══
const seedColor = document.getElementById('seed-color');
const hexInput = document.getElementById('hex-input');
const colorWrap = seedColor.parentElement;

function syncFromColor() {
  const v = seedColor.value;
  hexInput.value = v.toUpperCase();
  colorWrap.style.background = v;
  renderPalette();
}
function syncFromHex() {
  let v = hexInput.value.trim();
  if (!v.startsWith('#')) v = '#' + v;
  if (/^#[0-9a-fA-F]{6}$/.test(v)) {
    seedColor.value = v.toLowerCase();
    colorWrap.style.background = v;
    renderPalette();
  }
}
seedColor.addEventListener('input', syncFromColor);
hexInput.addEventListener('input', syncFromHex);

document.querySelectorAll('.scheme-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.scheme-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderPalette();
  });
});

document.getElementById('theme-toggle').addEventListener('click', () => {
  const cur = document.body.dataset.theme;
  document.body.dataset.theme = cur === 'dark' ? 'light' : 'dark';
});

renderPalette();
</script>
</body>
</html>
